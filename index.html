<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        body { background-color: #000; display: flex; justify-content: center; align-items: flex-end; height: 100vh; padding-bottom: 20px; overflow: hidden; }
        .calc-container { width: 100%; max-width: 400px; padding: 20px; }
        .screen { width: 100%; text-align: right; color: #fff; font-size: 70px; font-weight: 300; padding: 10px; margin-bottom: 20px; min-height: 100px; word-wrap: break-word; word-break: break-all; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        button { border: none; border-radius: 50%; height: 75px; width: 75px; font-size: 30px; font-weight: 500; cursor: pointer; transition: filter 0.1s; display: flex; justify-content: center; align-items: center; justify-self: center; }
        button:active { filter: brightness(130%); }
        .btn-gray { background-color: #a5a5a5; color: #000; }
        .btn-dark { background-color: #333333; color: #fff; }
        .btn-orange { background-color: #fe9e09; color: #fff; }
        .zero { grid-column: span 2; width: 100%; border-radius: 40px; justify-content: flex-start; padding-left: 30px; }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="screen" id="display">0</div>
    <div class="grid">
        <button class="btn-gray" onclick="handleClear()">C</button>
        <button class="btn-gray" onclick="append('(')">(</button>
        <button class="btn-gray" onclick="append(')')">)</button>
        <button class="btn-orange" onclick="append('/')">÷</button>

        <button class="btn-dark" onclick="append('7')">7</button>
        <button class="btn-dark" onclick="append('8')">8</button>
        <button class="btn-dark" onclick="append('9')">9</button>
        <button class="btn-orange" onclick="append('*')">×</button>

        <button class="btn-dark" onclick="append('4')">4</button>
        <button class="btn-dark" onclick="append('5')">5</button>
        <button class="btn-dark" onclick="append('6')">6</button>
        <button class="btn-orange" onclick="append('-')">-</button>

        <button class="btn-dark" onclick="append('1')">1</button>
        <button class="btn-dark" onclick="append('2')">2</button>
        <button class="btn-dark" onclick="append('3')">3</button>
        <button class="btn-orange" onclick="append('+')">+</button>

        <button class="btn-dark zero" onclick="append('0')">0</button>
        <button class="btn-dark" onclick="append('.')">.</button>
        <button class="btn-orange" onclick="append('=')">=</button>
    </div>
</div>

<script>
    // --- EDIT YOUR FORCED NUMBER HERE ---
    const FORCE_NUMBER = "4360411351073"; 
    
    let displayValue = "0";
    let isArmed = false;
    let lastClearTime = 0;

    const display = document.getElementById("display");

    function updateDisplay() {
        display.innerText = displayValue;
        // Dynamically shrink text if the number gets too long for the screen
        if (displayValue.length > 6) {
            display.style.fontSize = "45px";
        } else {
            display.style.fontSize = "70px";
        }
    }

    function append(val) {
        if (displayValue === "0" && !isNaN(val)) {
            displayValue = val;
        } else {
            displayValue += val;
        }
        updateDisplay();
    }

    function handleClear() {
        const currentTime = new Date().getTime();
        
        // SECRET TRIGGER: Double tap "C" within 500ms to Arm/Disarm the force
        if (currentTime - lastClearTime < 500) {
            isArmed = !isArmed;
            // Optional: Hard-to-notice visual confirmation (screen flashes slightly green if armed)
            if (isArmed) {
                display.style.color = "#a8ffb2";
                setTimeout(() => display.style.color = "#fff", 150);
            }
        }
        lastClearTime = currentTime;

        displayValue = "0";
        updateDisplay();
    }

    function append(val) {
        if (val === '=') {
            calculate();
            return;
        }
        if (displayValue === "0" && !['+', '-', '*', '/', '(', ')'].includes(val)) {
            displayValue = val;
        } else {
            displayValue += val;
        }
        updateDisplay();
    }

    function calculate() {
        if (isArmed) {
            displayValue = FORCE_NUMBER;
            isArmed = false; // Automatically disarms after firing so they can't trigger it again
            updateDisplay();
            return;
        }

        try {
            // Evaluates normal math safely if not armed
            let result = eval(displayValue);
            displayValue = String(result);
        } catch (e) {
            displayValue = "Error";
        }
        updateDisplay();
    }
</script>

</body>
</html>
